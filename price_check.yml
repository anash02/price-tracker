name: Daily Price Check

on:
  schedule:
    # Runs at 09:00 AM IST (03:30 UTC) every day
    - cron: "30 3 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit price_history.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run price tracker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          cd scraper
          python main.py

      - name: Commit updated price history
        run: |
          git config user.name "price-tracker-bot"
          git config user.email "actions@github.com"
          git add data/price_history.json
          git diff --cached --quiet || git commit -m "chore: update price history $(date +'%Y-%m-%d')"
          git push
